<!DOCTYPE html>
<html lang="en"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>Venture OS</title>
<meta name="description" content="Venture OS - a repository-driven operating system for building and scaling ventures.">
<meta name="theme-color" content="#1E5945">
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="static/icons/icon-192.png">
<link rel="icon" type="image/png" href="static/icons/icon-192.png">
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<style>
/* ============================================================
   CARD ATLAS — canonical design system. Copy this whole <style>
   block + the icon <svg> sprite verbatim into every page.
   To RE-THEME a project, change ONLY the variables marked [THEME].
   ============================================================ */
:root{
  /* [THEME] base + accent — the only block you change per project */
  --bg:#F4F6F2; --ink:#15231D; --ink-soft:#4C5A53; --ink-faint:#7C887F;
  --line:#E1E7DF; --line-strong:#D4DCD3; --card:#FFFFFF;
  --primary:#1E5945; --primary-deep:#143E30; --primary-soft:#E7F0EA;
  --glow:rgba(30,89,69,.06); /* hero background tint, match --primary */
  /* status (keep across themes) */
  --good:#2E8B6B; --good-soft:#E6F3EC;
  --watch:#B7740E; --watch-ink:#8A5705; --watch-soft:#FBF0DA;
  --alert:#BC4B45; --alert-ink:#9A3A35; --alert-soft:#FAE9E7;
  /* category accents for grouping (.cat / tiles) */
  --c1:#3E7A5A; --c2:#B7740E; --c3:#2E6F8E; --c4:#8A5A7E; --c5:#9A6B3F; --c6:#4E7E8C;
  /* scale (fixed — do not compress) */
  --radius:20px; --shadow:0 1px 2px rgba(20,40,30,.04),0 8px 28px -12px rgba(20,40,30,.14);
}
*{box-sizing:border-box}
html{-webkit-text-size-adjust:100%}
body{margin:0;background:radial-gradient(1200px 500px at 80% -10%,var(--glow),transparent 60%),var(--bg);color:var(--ink);font-family:'Inter',system-ui,sans-serif;line-height:1.6;-webkit-font-smoothing:antialiased}
.wrap{max-width:980px;margin:0 auto;padding:0 22px 90px}
.ic{width:1em;height:1em;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round;vertical-align:-.13em}
h1,h2,h3{font-family:'Fraunces',Georgia,serif;font-weight:500;letter-spacing:-.01em;line-height:1.14;margin:0}
kbd{font-family:'JetBrains Mono',monospace;font-size:.78em;border:1px solid var(--line-strong);border-bottom-width:2px;border-radius:6px;padding:1px 6px;background:var(--card);white-space:nowrap}
code{font-family:'JetBrains Mono',monospace;font-size:.85em;background:#FAFBF8;border:1px solid var(--line);border-radius:6px;padding:1px 6px;color:var(--ink)}
.eyebrow{font-family:'JetBrains Mono',monospace;font-size:.72rem;letter-spacing:.18em;text-transform:uppercase;color:var(--primary);font-weight:500;display:flex;align-items:center;gap:.6em}
.eyebrow::before{content:"";width:24px;height:1px;background:var(--primary);opacity:.5}

/* hero */
.hero{padding:56px 0 26px}
.hero h1{font-size:clamp(2.1rem,5.4vw,3.4rem);margin:18px 0 0;max-width:22ch}
.hero .lede{font-size:1.12rem;color:var(--ink-soft);max-width:64ch;margin:18px 0 0}
.hero .lede b{color:var(--ink);font-weight:600}
.chips{display:flex;flex-wrap:wrap;gap:10px;margin-top:22px;font-family:'JetBrains Mono',monospace;font-size:.77rem;color:var(--ink-soft)}
.tnode{display:inline-flex;align-items:center;gap:8px;background:var(--card);border:1px solid var(--line);border-radius:999px;padding:7px 14px;box-shadow:var(--shadow)}
.tnode .ic{width:15px;height:15px;color:var(--primary)}

/* stat cards */
.stats{display:grid;grid-template-columns:repeat(var(--n,3),1fr);gap:14px;margin-top:28px}
.stat{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:20px 22px;box-shadow:var(--shadow);position:relative;overflow:hidden}
.stat::before{content:"";position:absolute;left:0;top:0;bottom:0;width:4px;background:var(--cat,var(--primary))}
.stat .big{font-family:'Fraunces',serif;font-size:2.6rem;font-weight:600;line-height:1;color:var(--cat,var(--primary))}
.stat .ico-s{color:var(--cat,var(--primary))}.stat .ico-s .ic{width:21px;height:21px}
.stat .lbl{font-weight:600;margin-top:8px;font-size:.95rem}
.stat .sub{color:var(--ink-faint);font-size:.82rem;margin-top:3px;line-height:1.45}

/* sections */
section{margin-top:62px}
.sec-head{margin-bottom:22px}
.sec-head.num{display:flex;align-items:flex-start;gap:14px}
.sec-num{font-family:'JetBrains Mono',monospace;font-weight:700;font-size:.82rem;flex:none;width:30px;height:30px;border-radius:9px;background:var(--primary);color:#fff;display:grid;place-items:center;margin-top:6px}
.sec-head h2{font-size:clamp(1.6rem,3.6vw,2.2rem);margin-top:12px}
.sec-head.num h2{margin-top:0}
.sec-head p{color:var(--ink-soft);margin:9px 0 0;max-width:66ch}

/* cards */
.card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:28px 30px;box-shadow:var(--shadow);margin-bottom:20px;position:relative;overflow:hidden}
.card.cat{padding-left:30px}
.card.cat::before{content:"";position:absolute;left:0;top:0;bottom:0;width:4px;background:var(--bc,var(--primary))}
.card-top{display:flex;justify-content:space-between;align-items:flex-start;gap:14px;flex-wrap:wrap}
.card-title{display:flex;align-items:center;gap:14px}
.ico{width:42px;height:42px;border-radius:12px;flex:none;display:grid;place-items:center;background:var(--primary-soft);color:var(--primary)}
.ico .ic{width:22px;height:22px}
.card.cat .ico{background:color-mix(in srgb,var(--bc) 13%,var(--card));color:var(--bc)}
.card-title h3{font-size:1.28rem}
.card-title .val{font-family:'JetBrains Mono',monospace;font-size:.8rem;color:var(--ink-faint);margin-top:3px;font-weight:500;letter-spacing:.02em}
.lead{color:var(--ink-soft);margin:13px 0 0;font-size:.95rem}
.grid{display:grid;gap:18px}.g2{grid-template-columns:1fr 1fr}.g3{grid-template-columns:repeat(3,1fr)}

/* pills */
.pill{display:inline-flex;align-items:center;gap:7px;border-radius:999px;padding:5px 12px;font-size:.74rem;font-weight:700;white-space:nowrap;font-family:'JetBrains Mono',monospace}
.pill::before{content:"";width:7px;height:7px;border-radius:50%;background:currentColor}
.pill--good{background:var(--good-soft);color:var(--good)}
.pill--watch{background:var(--watch-soft);color:var(--watch-ink)}
.pill--alert{background:var(--alert-soft);color:var(--alert-ink)}
.pill--brand{background:var(--primary-soft);color:var(--primary)}

/* notes */
.note{margin-top:16px;border-radius:14px;padding:15px 17px;font-size:.92rem;display:flex;gap:12px;align-items:flex-start;line-height:1.55}
.note .ic{width:18px;height:18px;flex:none;margin-top:2px}
.note--you{background:var(--primary-soft);color:var(--primary-deep)}.note--you b{color:var(--primary-deep)}
.note--done{background:var(--good-soft);color:#1f5f47}.note--done b{color:#17452f}
.note--warn{background:var(--watch-soft);color:var(--watch-ink)}.note--warn b{color:#6e4604}

/* lists */
ul.list{list-style:none;margin:12px 0 0;padding:0}
ul.list li{position:relative;padding:9px 0 9px 24px;border-top:1px solid var(--line);color:var(--ink-soft);font-size:.92rem;line-height:1.55}
ul.list li:first-child{border-top:0}
ul.list li::before{content:"";position:absolute;left:2px;top:17px;width:7px;height:7px;border-radius:50%;background:var(--bc,var(--primary));opacity:.9}
ul.list li b{color:var(--ink);font-weight:600}
ol.steps{list-style:none;counter-reset:s;margin:12px 0 0;padding:0}
ol.steps li{counter-increment:s;display:flex;gap:13px;align-items:flex-start;padding:9px 0;font-size:.93rem;color:var(--ink-soft)}
ol.steps li::before{content:counter(s);font-family:'JetBrains Mono',monospace;font-weight:700;font-size:.72rem;flex:none;width:24px;height:24px;border-radius:7px;background:color-mix(in srgb,var(--primary) 12%,#fff);color:var(--primary);display:grid;place-items:center;margin-top:1px}
ol.steps b{color:var(--ink);font-weight:600}

/* mini data grids (stats/specs/recipe) */
.minigrid{display:grid;grid-template-columns:repeat(var(--m,3),1fr);gap:12px;margin-top:6px}
.cell{border:1px solid var(--line);border-radius:12px;padding:13px 14px;background:#FAFBF8}
.cell .t{font-family:'JetBrains Mono',monospace;font-size:.63rem;text-transform:uppercase;letter-spacing:.05em;color:var(--ink-faint);display:flex;gap:6px;align-items:center}
.cell .t .ic{width:13px;height:13px;color:var(--primary)}
.cell .v{font-weight:600;margin-top:5px;font-size:1rem}.cell .v small{font-weight:400;color:var(--ink-faint);font-size:.78rem}
.cell.lever{background:var(--primary-soft);border-color:transparent}.cell.lever .v,.cell.lever .t{color:var(--primary)}

/* segmented track (timelines, ranges, gauges) */
.track{display:flex;gap:3px;height:56px;border-radius:10px;margin-top:8px}
.seg{border-radius:7px;display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center;padding:4px;line-height:1.2;min-width:0;overflow:hidden}
.seg .sname{font-size:.66rem;font-weight:700}
.seg .srange{font-family:'JetBrains Mono',monospace;font-size:.6rem;opacity:.85;margin-top:2px}
.seg--good{background:var(--good-soft);color:#256f55}
.seg--watch{background:var(--watch-soft);color:var(--watch-ink)}
.seg--alert{background:var(--alert-soft);color:var(--alert-ink)}
.seg--flat{background:#ECEFEA;color:var(--ink-faint)}

/* CARD GRID — the core navigation pattern (items linking to pages) */
.cardgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(152px,1fr));gap:12px}
.tile{position:relative;display:block;text-decoration:none;border:1px solid var(--line);border-top:3px solid var(--dc,var(--primary));border-radius:14px;padding:14px 15px;background:var(--card);box-shadow:var(--shadow);transition:transform .15s ease,box-shadow .15s ease}
a.tile:hover{transform:translateY(-3px);box-shadow:0 2px 4px rgba(20,40,30,.05),0 16px 34px -14px rgba(20,40,30,.22)}
.tile .tn{font-family:'JetBrains Mono',monospace;font-size:.62rem;font-weight:700;letter-spacing:.06em;color:var(--dc,var(--primary));display:flex;align-items:center;justify-content:space-between}
.tile .tn .ic{width:14px;height:14px}
.tile .tt{font-family:'Fraunces',Georgia,serif;font-size:1.02rem;font-weight:600;margin:6px 0 4px;line-height:1.15;color:var(--ink)}
.tile .td{font-size:.78rem;color:var(--ink-soft);line-height:1.4}
.tile .go{margin-top:10px;font-family:'JetBrains Mono',monospace;font-size:.63rem;font-weight:700;color:var(--dc,var(--primary));display:flex;align-items:center;gap:5px}
.tile .go .ic{width:13px;height:13px}
.tile.lock{opacity:.55;background:#FAFBF8;box-shadow:none;cursor:default}
.tile.lock .tt{color:var(--ink-soft)}.tile.lock .go{color:var(--ink-faint);font-weight:500}

/* page-to-page nav (prev / index / next) */
.pagenav{display:flex;gap:12px;margin-top:24px;align-items:stretch}
.pagenav a,.pagenav span{flex:1;border:1px solid var(--line);border-radius:14px;padding:14px 16px;text-decoration:none;background:var(--card);box-shadow:var(--shadow);display:flex;flex-direction:column;gap:3px}
.pagenav .dir{font-family:'JetBrains Mono',monospace;font-size:.62rem;text-transform:uppercase;letter-spacing:.08em;color:var(--ink-faint)}
.pagenav .ttl{font-family:'Fraunces',Georgia,serif;font-weight:600;color:var(--ink);font-size:.98rem}
.pagenav a:hover{border-color:var(--primary)}.pagenav a:hover .ttl{color:var(--primary)}
.pagenav .disabled{opacity:.5}.pagenav .nextcol{text-align:right}

/* sticky header */
.topbar{position:sticky;top:0;z-index:50;background:color-mix(in srgb,var(--bg) 86%,transparent);-webkit-backdrop-filter:blur(10px);backdrop-filter:blur(10px);border-bottom:1px solid var(--line)}
.topbar .bar{max-width:980px;margin:0 auto;padding:11px 22px;display:flex;align-items:center;gap:12px}
.brand{display:flex;align-items:center;gap:9px;text-decoration:none;color:var(--ink)}
.brand .mark{width:28px;height:28px;border-radius:8px;background:var(--primary);color:#fff;display:grid;place-items:center}
.brand .mark .ic{width:16px;height:16px}
.brand .bt{font-family:'Fraunces',Georgia,serif;font-weight:600;font-size:1.02rem;letter-spacing:-.01em;line-height:1}
.brand .bt small{display:block;font-family:'JetBrains Mono',monospace;font-weight:500;font-size:.56rem;letter-spacing:.14em;text-transform:uppercase;color:var(--ink-faint);margin-top:3px}
.nav{margin-left:auto;display:flex;align-items:center;gap:7px}
.nav a{font-family:'JetBrains Mono',monospace;font-size:.72rem;letter-spacing:.03em;text-decoration:none;color:var(--ink-soft);padding:8px 13px;border-radius:999px;display:inline-flex;align-items:center;gap:6px;white-space:nowrap}
.nav a .ic{width:14px;height:14px}
.nav a:hover{color:var(--ink);background:var(--primary-soft)}
.nav a.active{color:var(--primary);background:var(--primary-soft)}
.nav a.btn{background:var(--primary);color:#fff}.nav a.btn:hover{background:var(--primary-deep);color:#fff}
@media(max-width:560px){.brand .bt small{display:none}.nav a.hideable{display:none}.nav a{padding:8px 11px}}

/* closing banner + footer bits */
.closing{margin-top:18px;background:var(--primary);color:#eaf4ee;border-radius:var(--radius);padding:26px 30px;display:flex;gap:16px;align-items:flex-start}
.closing .ic{width:24px;height:24px;flex:none;color:#bfe0cd;margin-top:2px}
.closing h3{color:#fff;font-size:1.22rem;margin:0 0 6px}
.closing p{margin:0;color:#cfe6d8;font-size:.95rem}
.disc{margin-top:30px;border:1px dashed var(--line-strong);border-radius:16px;padding:18px 22px;background:rgba(255,255,255,.5);color:var(--ink-faint);font-size:.84rem;line-height:1.6;display:flex;gap:13px;align-items:flex-start}
.disc .ic{width:18px;height:18px;flex:none;margin-top:2px}
.sign{margin-top:30px;text-align:center;color:var(--ink-faint);font-family:'JetBrains Mono',monospace;font-size:.72rem;letter-spacing:.08em}

.codeblock{font-family:'JetBrains Mono',monospace;font-size:.76rem;background:#FAFBF8;border:1px solid var(--line);border-radius:12px;padding:14px 16px;color:var(--ink);overflow-x:auto;white-space:pre;line-height:1.7;margin-top:12px}
.swatches{display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:10px;margin-top:6px}
.sw{border:1px solid var(--line);border-radius:12px;overflow:hidden;background:var(--card)}
.sw .chip{height:46px}.sw .meta{padding:8px 10px;font-family:'JetBrains Mono',monospace;font-size:.66rem;color:var(--ink-soft)}
.sw .meta b{display:block;color:var(--ink);font-size:.72rem}
.iconwall{display:grid;grid-template-columns:repeat(auto-fill,minmax(96px,1fr));gap:10px;margin-top:6px}
.iw{border:1px solid var(--line);border-radius:12px;background:#FAFBF8;padding:12px 8px;text-align:center}
.iw .ic{width:22px;height:22px;color:var(--primary)}
.iw span{display:block;margin-top:7px;font-family:'JetBrains Mono',monospace;font-size:.6rem;color:var(--ink-faint)}

/* reveal-on-scroll (optional; add class "rv" to any element) */

.rv.in{opacity:1;transform:none}
@media (max-width:760px){.g2,.g3{grid-template-columns:1fr}.stats{grid-template-columns:1fr}}
@media (prefers-reduced-motion:reduce){.rv{opacity:1;transform:none;transition:none}}
@media print{body{background:#fff}.rv{opacity:1;transform:none}.card,.stat,.tile,.closing{box-shadow:none;break-inside:avoid}section{margin-top:30px}}

/* scroll reveal — sections & cards fade in as they enter the viewport */
html.js-reveal .hero,html.js-reveal .sec-head,html.js-reveal .card,html.js-reveal .stat,html.js-reveal .daycard,html.js-reveal .day,html.js-reveal .tile,html.js-reveal .excard,html.js-reveal .daynav,html.js-reveal .pagenav,html.js-reveal .closing{opacity:0;transform:translateY(16px);transition:opacity .6s cubic-bezier(.22,.61,.36,1),transform .6s cubic-bezier(.22,.61,.36,1)}
html.js-reveal .reveal-in{opacity:1!important;transform:none!important}
@media (prefers-reduced-motion:reduce){html.js-reveal .hero,html.js-reveal .sec-head,html.js-reveal .card,html.js-reveal .stat,html.js-reveal .daycard,html.js-reveal .day,html.js-reveal .tile,html.js-reveal .excard,html.js-reveal .daynav,html.js-reveal .pagenav,html.js-reveal .closing{opacity:1;transform:none;transition:none}}
</style>
<style>
/* Application Layer render adapter - base-element styles for repository Markdown (TECHNICAL_ARCHITECTURE v2.0). Tokens only. */
#app{min-height:60vh}
/* Mission — the cockpit landing (Experience Architecture) */
.mission{max-width:760px}
.mission .eyebrow{margin-bottom:16px}
.mission-win{font-family:'Fraunces',Georgia,serif;font-weight:500;letter-spacing:-.01em;line-height:1.12;font-size:clamp(2rem,5vw,3rem);margin:0 0 14px;color:var(--ink)}
.mission-meaning{font-size:1.08rem;color:var(--ink-soft);max-width:60ch;margin:0 0 30px;line-height:1.6}
.mission-action{display:block;text-decoration:none;background:var(--primary-soft);border-left:4px solid var(--primary);border-radius:var(--radius);padding:22px 24px;box-shadow:var(--shadow);transition:transform .15s ease,box-shadow .15s ease}
.mission-action:hover{transform:translateY(-2px);box-shadow:0 2px 4px rgba(20,40,30,.05),0 16px 34px -14px rgba(20,40,30,.22)}
.mission-action .ma-label{font-family:'JetBrains Mono',monospace;font-size:.7rem;letter-spacing:.16em;text-transform:uppercase;color:var(--primary);display:flex;align-items:center;gap:.6em}
.mission-action .ma-text{font-family:'Fraunces',Georgia,serif;font-size:1.3rem;color:var(--primary-deep);margin:10px 0 0;line-height:1.3}
.mission-action .ma-go{margin-top:14px;font-family:'JetBrains Mono',monospace;font-size:.72rem;font-weight:700;color:var(--primary);display:flex;align-items:center;gap:6px}
.mission-progress{margin-top:40px}
.statepath{height:46px}
.rev-bar{height:10px;border-radius:999px;background:var(--line);overflow:hidden;margin-top:10px}
.rev-fill{height:100%;background:var(--primary);border-radius:999px;transition:width .6s cubic-bezier(.22,.61,.36,1)}
.rev-meta{display:flex;justify-content:space-between;font-family:'JetBrains Mono',monospace;font-size:.72rem;color:var(--ink-faint);margin-top:8px}
.mission-stakes{margin-top:42px;display:grid;gap:16px}
.mission>*{opacity:0;animation:missionIn .55s cubic-bezier(.22,.61,.36,1) forwards}
.mission>*:nth-child(2){animation-delay:.08s}.mission>*:nth-child(3){animation-delay:.16s}
.mission>*:nth-child(4){animation-delay:.24s}.mission>*:nth-child(5){animation-delay:.32s}
.mission>*:nth-child(6){animation-delay:.40s}.mission>*:nth-child(7){animation-delay:.48s}
@keyframes missionIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
.mission-delta{display:flex;align-items:center;gap:.5em;font-family:'JetBrains Mono',monospace;font-size:.74rem;color:var(--ink-faint);margin:22px 0 0}
.mission-delta .ic{width:14px;height:14px;color:var(--primary)}
.capture-card{display:block;width:100%;text-align:left;cursor:pointer;background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:16px 20px;margin-top:18px;box-shadow:var(--shadow);font-family:inherit;transition:border-color .15s ease,transform .15s ease}
.capture-card:hover{border-color:var(--primary);transform:translateY(-1px)}
.capture-card .cap-label{font-family:'JetBrains Mono',monospace;font-size:.66rem;letter-spacing:.14em;text-transform:uppercase;color:var(--ink-faint);display:flex;align-items:center;gap:.5em}
.capture-card .cap-text{color:var(--ink-soft);font-size:.95rem;margin-top:6px}
.capture-card .cap-go{margin-top:10px;font-family:'JetBrains Mono',monospace;font-size:.7rem;font-weight:700;color:var(--primary);display:flex;align-items:center;gap:6px}
@media(prefers-reduced-motion:reduce){.mission>*{opacity:1;animation:none}}
.doc-body>h1:first-child{margin-top:0}
.doc-body h1{font-size:1.9rem;margin:26px 0 8px}
.doc-body h2{font-size:1.4rem;margin:26px 0 8px}
.doc-body h3{font-size:1.14rem;margin:20px 0 6px}
.doc-body p{color:var(--ink-soft);margin:11px 0}
.doc-body a{color:var(--primary)}
.doc-body strong{color:var(--ink);font-weight:600}
.doc-body ul,.doc-body ol{color:var(--ink-soft);padding-left:22px;margin:10px 0}
.doc-body li{margin:5px 0}
.doc-body blockquote{margin:14px 0;padding:10px 16px;border-left:3px solid var(--primary);background:var(--primary-soft);border-radius:0 12px 12px 0;color:var(--primary-deep)}
.doc-body blockquote p{color:var(--primary-deep);margin:4px 0}
.doc-body pre{background:#FAFBF8;border:1px solid var(--line);border-radius:12px;padding:14px 16px;overflow-x:auto;margin:12px 0}
.doc-body table{width:100%;border-collapse:collapse;margin:14px 0;font-size:.9rem;display:block;overflow-x:auto}
.doc-body th,.doc-body td{border:1px solid var(--line);padding:8px 11px;text-align:left;vertical-align:top}
